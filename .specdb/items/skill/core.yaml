# スキル — Claude Code / GitHub Copilot に配布されるエージェントスキル

- id: sk-docextract
  name: docextract
  purpose: >-
    Office 文書 (Word / Excel / PowerPoint) と PDF を解析し、テキスト・表・画像を
    抽出して出典付きの構造化 JSON として出力する文書抽出スキル。
  runtime: Python 3.10+（共有仮想環境 .venv、起動スクリプト経由で自動セットアップ）
  status: approved
  rules: [dr-01, dr-05]
  source:
    doc: README.md
    location: { section: "冒頭" }
    evidence: "Office 文書 (Word / Excel / PowerPoint) と PDF を解析し、テキスト・表・画像を抽出して JSON 形式で出力するツールです。"

- id: sk-specdb
  name: specdb
  purpose: >-
    仕様アイテムと関係を YAML のデータ（正本）として保存し、設計書はそこから
    生成されるビューにする仕様データ管理スキル。メタモデル駆動で機械検証・
    文書生成・ベースライン差分・グラフ可視化を提供する。
  runtime: Python 3.10+（依存は PyYAML + Jinja2 のみ）
  status: approved
  rules: [dr-01, dr-03, dr-05, dr-06]
  source:
    doc: specdb/README.md
    location: { section: "冒頭" }
    evidence: "「文書を保存する」のではなく「仕様アイテムと関係をデータ（正本）として保存し、設計書はそこから生成されるビューにする」構想の実証。"
