# システム基本設計書（Excel 風 HTML）— 標準文書の雛形（abstract）
#
# 消費側は documents/basic-design.yaml に `from_standard: basic-design` を書き、
# system_name / doc_no / version / preface を穴埋めして実体化する。
abstract: true
title: システム基本設計書（{system_name}）
output: 基本設計書_{system_name}.html
template: basic-design.html.j2
doc_no: { pattern: 'SD-[A-Z]{2,4}-\d{3}' }
params:
  required: [system_name, doc_no, version, preface.purpose, preface.scope]
